<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inmapper Kiosk — Config Editor</title>
    <link rel="stylesheet" href="src/editor/styles.css">
    <!-- Lucide icons — used for sheet-driven category icons (name → SVG). -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <!-- Three.js — used by the Map Builder to render placed 3D models on the
         processed-map preview (mirrors the runtime importmap in index.html). -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div class="editor-app">
        <!-- Top bar -->
        <header class="ed-topbar">
            <div class="ed-topbar-left">
                <div class="ed-brand">
                    <div class="ed-brand-mark">IK</div>
                    <div>
                        <div class="ed-brand-title">Config Editor</div>
                        <div class="ed-brand-sub">Inmapper Kiosk</div>
                    </div>
                </div>
            </div>

            <div class="ed-topbar-center">
                <nav class="ed-tabs" role="tablist" aria-label="Editör sekmeleri">
                    <button type="button" class="ed-tab is-active" data-tab="map" role="tab" aria-selected="true">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
                        <span>Harita</span>
                    </button>
                    <button type="button" class="ed-tab" data-tab="settings" role="tab" aria-selected="false">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        <span>Ayarlar</span>
                    </button>
                    <button type="button" class="ed-tab" data-tab="items" role="tab" aria-selected="false">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        <span>Birimler</span>
                    </button>
                    <button type="button" class="ed-tab" data-tab="categories" role="tab" aria-selected="false">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                        <span>Kategoriler</span>
                    </button>
                    <button type="button" class="ed-tab" data-tab="export" role="tab" aria-selected="false">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        <span>Dışa Aktar</span>
                    </button>
                </nav>
            </div>

            <div class="ed-topbar-right">
                <button type="button" id="edStorageBtn" class="ed-btn ed-btn-ghost ed-btn-storage" title="Yerel proje durumu">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></svg>
                    <span id="edStorageLabel">—</span>
                </button>
                <button type="button" id="edReloadBtn" class="ed-btn ed-btn-ghost" title="Önizlemeyi yenile">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
                    <span>Yenile</span>
                </button>
                <button type="button" id="edResetBtn" class="ed-btn ed-btn-ghost" title="Tüm değişiklikleri sıfırla">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                    <span>Sıfırla</span>
                </button>
            </div>
        </header>

        <!-- Tab panels -->
        <main class="ed-main">

            <!-- ── Map Builder tab ── -->
            <section class="ed-tab-panel is-active" id="tabMap" data-tab="map">
                <div id="edMapBuilder" class="ed-mb-root"></div>
            </section>

            <!-- ── Settings tab (existing form + iframe) ── -->
            <section class="ed-tab-panel" id="tabSettings" data-tab="settings">
                <div class="ed-settings-grid">
                    <aside class="ed-sidebar">
                        <div class="ed-sidebar-toolbar">
                            <div class="ed-device-switch" role="tablist" aria-label="Cihaz önizlemesi">
                                <button type="button" data-device="web" class="ed-device-btn is-active">
                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                                    <span>Web</span>
                                </button>
                                <button type="button" data-device="kiosk" class="ed-device-btn">
                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="14" rx="1"/><path d="M7 21h10M10 17v4M14 17v4"/></svg>
                                    <span>Kiosk</span>
                                </button>
                                <button type="button" data-device="kiosk-portrait" class="ed-device-btn">
                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="18" rx="1"/><path d="M8 22h8M11 18v3M13 18v3"/></svg>
                                    <span>Kiosk Dikey</span>
                                </button>
                                <button type="button" data-device="mobile" class="ed-device-btn">
                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg>
                                    <span>Mobil</span>
                                </button>
                            </div>
                        </div>
                        <div class="ed-search">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                            <input type="text" id="edSearch" placeholder="Ayarlarda ara…" autocomplete="off">
                        </div>
                        <div class="ed-form" id="edForm"></div>
                        <div class="ed-sidebar-footer">
                            <div class="ed-status" id="edStatus">Hazır</div>
                        </div>
                    </aside>

                    <section class="ed-preview">
                        <div class="ed-scene-toolbar">
                            <div class="ed-scene-toolbar-label">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg>
                                <span>Sahne</span>
                            </div>
                            <div class="ed-scene-bar" id="edSceneBar"></div>
                            <div class="ed-scene-hint" id="edSceneHint"></div>
                        </div>

                        <div class="ed-preview-toolbar">
                            <div class="ed-preview-url" id="edPreviewUrl">index.html?preview=1</div>
                            <div class="ed-reload-pill" id="edReloadPill" hidden>
                                <span class="ed-reload-dot"></span>
                                <span>Reload gerekiyor…</span>
                            </div>
                        </div>

                        <div class="ed-preview-stage" id="edPreviewStage">
                            <div class="ed-device-frame" id="edDeviceFrame" data-device="web">
                                <div class="ed-device-screen">
                                    <iframe id="edPreviewFrame" src="index.html?preview=1" title="Canlı önizleme"></iframe>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </section>

            <!-- ── Items tab ── -->
            <section class="ed-tab-panel" id="tabItems" data-tab="items">
                <div id="edItems" class="ed-items-root"></div>
            </section>

            <!-- ── Categories tab ── -->
            <section class="ed-tab-panel" id="tabCategories" data-tab="categories">
                <div id="edCategories" class="ed-cat-root"></div>
            </section>

            <!-- ── Export tab ── -->
            <section class="ed-tab-panel" id="tabExport" data-tab="export">
                <div id="edExport" class="ed-export-root"></div>
            </section>
        </main>
    </div>

    <script type="module" src="src/editor/main.js"></script>
</body>
</html>
